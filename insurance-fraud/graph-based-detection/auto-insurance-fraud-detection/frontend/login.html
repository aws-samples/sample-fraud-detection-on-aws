<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Auto Insurance Fraud Detection</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-box">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h1 data-i18n="loginTitle">Auto Insurance Fraud Detection</h1>
                <select id="languageSelector" class="language-selector" style="margin: 0;">
                    <option value="en">English</option>
                    <option value="es">Español</option>
                    <option value="pt">Português</option>
                </select>
            </div>
            <p class="subtitle" data-i18n="demoLogin">Demo Login</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="username" data-i18n="email">Email</label>
                    <input type="email" id="username" required data-i18n-placeholder="enterEmail" placeholder="Enter your email">
                </div>
                
                <div class="form-group">
                    <label for="password" data-i18n="password">Password</label>
                    <input type="password" id="password" required data-i18n-placeholder="enterPassword" placeholder="Enter your password">
                </div>
                
                <button type="submit" id="loginBtn" data-i18n="login">Login</button>
                
                <div id="errorMessage" class="error-message"></div>
            </form>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Initialize language
        const languageSelector = document.getElementById('languageSelector');
        languageSelector.value = i18n.currentLang;
        i18n.updateUI();
        
        // Update placeholders
        document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
            const key = el.getAttribute('data-i18n-placeholder');
            el.placeholder = i18n.t(key);
        });
        
        languageSelector.addEventListener('change', (e) => {
            i18n.setLanguage(e.target.value);
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                const key = el.getAttribute('data-i18n-placeholder');
                el.placeholder = i18n.t(key);
            });
        });

        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const loginForm = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');

        // Check if already authenticated
        if (auth.isAuthenticated()) {
            window.location.href = 'index.html';
        }

        // Handle login
        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = usernameInput.value.trim();
            const password = passwordInput.value;
            
            if (!username || !password) {
                errorMessage.textContent = i18n.t('enterEmailPassword');
                return;
            }

            loginBtn.disabled = true;
            loginBtn.textContent = i18n.t('loggingIn');
            errorMessage.textContent = '';

            const result = await auth.login(username, password);
            
            if (result.success) {
                window.location.href = 'index.html';
            } else {
                errorMessage.textContent = result.error || i18n.t('loginFailed');
                loginBtn.disabled = false;
                loginBtn.textContent = i18n.t('login');
            }
        });
    </script>
</body>
</html>
