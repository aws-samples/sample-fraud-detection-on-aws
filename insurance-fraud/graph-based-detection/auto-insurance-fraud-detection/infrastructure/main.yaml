AWSTemplateFormatVersion: '2010-09-09'
Description: 'Auto Insurance Fraud Detection System - Root Stack'

Parameters:
  TemplateBucket:
    Type: String
    Description: S3 bucket containing nested stack templates
  
  LambdaCodeBucket:
    Type: String
    Description: S3 bucket containing Lambda deployment packages
  
  LambdaCodeVersion:
    Type: String
    Default: 'latest'
    Description: Version/timestamp for Lambda code
  
  NeptuneInstanceClass:
    Type: String
    Default: db.t3.medium
    AllowedValues:
      - db.t3.medium
      - db.r5.large
      - db.r5.xlarge
      - db.r5.2xlarge
    Description: Neptune instance class
  
  CloudFrontWebACLArn:
    Type: String
    Description: 'ARN of CloudFront WAF WebACL from us-east-1 (optional - leave empty if not using WAF)'
    Default: ''

  AllowedOrigin:
    Type: String
    Description: 'CloudFront URL for CORS (e.g. https://xxxx.cloudfront.net). Leave empty on first deploy, then re-deploy with the actual URL.'
    Default: '*'

Resources:
  # Helper resources (S3 prefix list lookup)
  HelpersStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub 'https://${TemplateBucket}.s3.${AWS::Region}.amazonaws.com/stacks/helpers.yaml'
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-Helpers'

  # Network infrastructure
  NetworkStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub 'https://${TemplateBucket}.s3.${AWS::Region}.amazonaws.com/stacks/network.yaml'
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-Network'

  # Security groups
  SecurityGroupsStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: [NetworkStack, HelpersStack]
    Properties:
      TemplateURL: !Sub 'https://${TemplateBucket}.s3.${AWS::Region}.amazonaws.com/stacks/security-groups.yaml'
      Parameters:
        VpcId: !GetAtt NetworkStack.Outputs.VpcId
        S3PrefixListId: !GetAtt HelpersStack.Outputs.S3PrefixListId
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-SecurityGroups'

  # VPC Endpoints
  VPCEndpointsStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: [NetworkStack, SecurityGroupsStack]
    Properties:
      TemplateURL: !Sub 'https://${TemplateBucket}.s3.${AWS::Region}.amazonaws.com/stacks/vpc-endpoints.yaml'
      Parameters:
        VpcId: !GetAtt NetworkStack.Outputs.VpcId
        PrivateSubnet1: !GetAtt NetworkStack.Outputs.PrivateSubnet1
        PrivateSubnet2: !GetAtt NetworkStack.Outputs.PrivateSubnet2
        VPCEndpointSecurityGroup: !GetAtt SecurityGroupsStack.Outputs.VPCEndpointSecurityGroup
        PrivateRouteTable: !GetAtt NetworkStack.Outputs.PrivateRouteTable
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-VPCEndpoints'

  # IAM roles
  IAMStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub 'https://${TemplateBucket}.s3.${AWS::Region}.amazonaws.com/stacks/iam.yaml'
      Parameters:
        S3BucketName: !Sub 'neptune-ml-auto-insurance-${AWS::AccountId}-${AWS::Region}'
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-IAM'

  # Storage (S3 + Neptune)
  StorageStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: [NetworkStack, SecurityGroupsStack, IAMStack]
    Properties:
      TemplateURL: !Sub 'https://${TemplateBucket}.s3.${AWS::Region}.amazonaws.com/stacks/storage.yaml'
      Parameters:
        PrivateSubnet1: !GetAtt NetworkStack.Outputs.PrivateSubnet1
        PrivateSubnet2: !GetAtt NetworkStack.Outputs.PrivateSubnet2
        NeptuneSecurityGroup: !GetAtt SecurityGroupsStack.Outputs.NeptuneSecurityGroup
        NeptuneMLRoleArn: !GetAtt IAMStack.Outputs.NeptuneMLRoleArn
        SageMakerMLRoleArn: !GetAtt IAMStack.Outputs.SageMakerMLRoleArn
        NeptuneInstanceClass: !Ref NeptuneInstanceClass
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-Storage'

  # Batch compute
  BatchStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: [NetworkStack, SecurityGroupsStack, IAMStack]
    Properties:
      TemplateURL: !Sub 'https://${TemplateBucket}.s3.${AWS::Region}.amazonaws.com/stacks/batch.yaml'
      Parameters:
        PublicSubnet: !GetAtt NetworkStack.Outputs.PublicSubnet
        BatchSecurityGroup: !GetAtt SecurityGroupsStack.Outputs.BatchSecurityGroup
        BatchServiceRoleArn: !GetAtt IAMStack.Outputs.BatchServiceRoleArn
        BatchInstanceProfileArn: !GetAtt IAMStack.Outputs.BatchInstanceProfileArn
        BatchJobRoleArn: !GetAtt IAMStack.Outputs.BatchJobRoleArn
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-Batch'

  # Lambda functions
  LambdaStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: [NetworkStack, SecurityGroupsStack, IAMStack, StorageStack, BatchStack, VPCEndpointsStack, CognitoStack]
    Properties:
      TemplateURL: !Sub 'https://${TemplateBucket}.s3.${AWS::Region}.amazonaws.com/stacks/lambda.yaml'
      Parameters:
        LambdaCodeBucket: !Ref LambdaCodeBucket
        LambdaCodeVersion: !Ref LambdaCodeVersion
        LambdaSecurityGroup: !GetAtt SecurityGroupsStack.Outputs.LambdaSecurityGroup
        PrivateSubnet1: !GetAtt NetworkStack.Outputs.PrivateSubnet1
        PrivateSubnet2: !GetAtt NetworkStack.Outputs.PrivateSubnet2
        LambdaExecutionRoleArn: !GetAtt IAMStack.Outputs.LambdaExecutionRoleArn
        TrainingLambdaRoleArn: !GetAtt IAMStack.Outputs.TrainingLambdaRoleArn
        NeptuneEndpoint: !GetAtt StorageStack.Outputs.NeptuneClusterEndpoint
        S3BucketName: !GetAtt StorageStack.Outputs.S3BucketName
        NeptuneMLRoleArn: !GetAtt IAMStack.Outputs.NeptuneMLRoleArn
        SageMakerMLRoleArn: !GetAtt IAMStack.Outputs.SageMakerMLRoleArn
        NeptuneParameterGroupName: !GetAtt StorageStack.Outputs.NeptuneParameterGroupName
        NeptuneInstanceId: !GetAtt StorageStack.Outputs.NeptuneInstanceId
        BatchJobQueue: !GetAtt BatchStack.Outputs.BatchJobQueue
        BatchJobDefinition: !GetAtt BatchStack.Outputs.BatchJobDefinition
        UserPoolId: !GetAtt CognitoStack.Outputs.UserPoolId
        UserPoolClientId: !GetAtt CognitoStack.Outputs.UserPoolClientId
        AllowedOrigin: !Ref AllowedOrigin
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-Lambda'

  # Cognito User Pool
  CognitoStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub 'https://${TemplateBucket}.s3.${AWS::Region}.amazonaws.com/stacks/cognito.yaml'
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-Cognito'

  # API Gateway
  APIStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: [LambdaStack, WAFStack, CognitoStack, StorageStack]
    Properties:
      TemplateURL: !Sub 'https://${TemplateBucket}.s3.${AWS::Region}.amazonaws.com/stacks/api.yaml'
      Parameters:
        FraudDetectionFunctionArn: !GetAtt LambdaStack.Outputs.FraudDetectionFunctionArn
        AuthenticateUserFunctionArn: !GetAtt LambdaStack.Outputs.AuthenticateUserFunctionArn
        TemplateBucket: !Ref TemplateBucket
        WebACLArn: !GetAtt WAFStack.Outputs.WebACLArn
        UserPoolId: !GetAtt CognitoStack.Outputs.UserPoolId
        UserPoolClientId: !GetAtt CognitoStack.Outputs.UserPoolClientId
        UserPoolIssuer: !GetAtt CognitoStack.Outputs.UserPoolIssuer
        AllowedOrigin: !Ref AllowedOrigin
        KmsKeyArn: !GetAtt StorageStack.Outputs.LogsEncryptionKeyArn
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-API'

  # WAF for API Gateway
  WAFStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: [StorageStack]
    Properties:
      TemplateURL: !Sub 'https://${TemplateBucket}.s3.${AWS::Region}.amazonaws.com/stacks/waf.yaml'
      Parameters:
        LogGroupKmsKeyArn: !GetAtt StorageStack.Outputs.LogsEncryptionKeyArn
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-WAF'

  # ML Training Pipeline
  MLPipelineStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: [IAMStack, LambdaStack, StorageStack]
    Properties:
      TemplateURL: !Sub 'https://${TemplateBucket}.s3.${AWS::Region}.amazonaws.com/stacks/ml-pipeline.yaml'
      Parameters:
        StepFunctionsRoleArn: !GetAtt IAMStack.Outputs.StepFunctionsRoleArn
        EventBridgeRoleArn: !GetAtt IAMStack.Outputs.EventBridgeRoleArn
        RequestQuotasFunctionArn: !GetAtt LambdaStack.Outputs.RequestQuotasFunctionArn
        CheckQuotaStatusFunctionArn: !GetAtt LambdaStack.Outputs.CheckQuotaStatusFunctionArn
        StartNeptuneExportFunctionArn: !GetAtt LambdaStack.Outputs.StartNeptuneExportFunctionArn
        CheckNeptuneExportFunctionArn: !GetAtt LambdaStack.Outputs.CheckNeptuneExportFunctionArn
        ProcessExportedDataFunctionArn: !GetAtt LambdaStack.Outputs.ProcessExportedDataFunctionArn
        CheckProcessingStatusFunctionArn: !GetAtt LambdaStack.Outputs.CheckProcessingStatusFunctionArn
        ValidateTrainingDataFunctionArn: !GetAtt LambdaStack.Outputs.ValidateTrainingDataFunctionArn
        TrainModelFunctionArn: !GetAtt LambdaStack.Outputs.TrainModelFunctionArn
        CheckTrainingStatusFunctionArn: !GetAtt LambdaStack.Outputs.CheckTrainingStatusFunctionArn
        TestModelPerformanceFunctionArn: !GetAtt LambdaStack.Outputs.TestModelPerformanceFunctionArn
        DeployEndpointFunctionArn: !GetAtt LambdaStack.Outputs.DeployEndpointFunctionArn
        NeptuneEndpoint: !GetAtt StorageStack.Outputs.NeptuneClusterEndpoint
        S3BucketName: !GetAtt StorageStack.Outputs.S3BucketName
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-MLPipeline'

  # Frontend (S3 + CloudFront)
  FrontendStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: [APIStack]
    Properties:
      TemplateURL: !Sub 'https://${TemplateBucket}.s3.${AWS::Region}.amazonaws.com/stacks/frontend.yaml'
      Parameters:
        CloudFrontWebACLArn: !Ref CloudFrontWebACLArn
        APIEndpoint: !Sub 'https://${APIStack.Outputs.APIId}.execute-api.${AWS::Region}.amazonaws.com'
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-Frontend'

Outputs:
  APIEndpoint:
    Description: Fraud Detection API Endpoint
    Value: !GetAtt APIStack.Outputs.APIEndpoint
    Export:
      Name: !Sub '${AWS::StackName}-APIEndpoint'
  
  NeptuneClusterEndpoint:
    Description: Neptune Cluster Endpoint
    Value: !GetAtt StorageStack.Outputs.NeptuneClusterEndpoint
    Export:
      Name: !Sub '${AWS::StackName}-NeptuneEndpoint'
  
  S3BucketName:
    Description: S3 Bucket for Neptune ML
    Value: !GetAtt StorageStack.Outputs.S3BucketName
    Export:
      Name: !Sub '${AWS::StackName}-S3Bucket'
  
  PopulateGraphFunctionName:
    Description: Populate Graph Lambda Function Name
    Value: !GetAtt LambdaStack.Outputs.PopulateGraphFunctionName
  
  StateMachineArn:
    Description: ML Training Pipeline State Machine ARN
    Value: !GetAtt MLPipelineStack.Outputs.StateMachineArn
  
  UserPoolId:
    Description: Cognito User Pool ID
    Value: !GetAtt CognitoStack.Outputs.UserPoolId
  
  UserPoolClientId:
    Description: Cognito User Pool Client ID
    Value: !GetAtt CognitoStack.Outputs.UserPoolClientId
  
  UserPoolDomain:
    Description: Cognito User Pool Domain
    Value: !GetAtt CognitoStack.Outputs.UserPoolDomain
  
  CloudFrontURL:
    Description: Frontend CloudFront Distribution URL
    Value: !GetAtt FrontendStack.Outputs.WebsiteURL
    Export:
      Name: !Sub '${AWS::StackName}-CloudFrontURL'
  
  FrontendBucketName:
    Description: Frontend S3 Bucket Name
    Value: !GetAtt FrontendStack.Outputs.BucketName
