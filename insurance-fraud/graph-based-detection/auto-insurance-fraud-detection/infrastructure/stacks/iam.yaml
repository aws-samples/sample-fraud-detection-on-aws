AWSTemplateFormatVersion: '2010-09-09'
Description: 'IAM roles for Auto Insurance Fraud Detection'

# Security Note: Some IAM policies use Resource: '*' where required by AWS service design.
# These are necessary for:
# - EC2 Describe operations (read-only, no resource-level permissions available)
# - ECR GetAuthorizationToken (account-level operation)
# - CloudWatch Logs (dynamic log stream creation)
# - SageMaker operations (model training requires broad permissions)
# All policies follow least privilege principle within AWS service constraints.

Parameters:
  S3BucketName:
    Type: String

Resources:
  NeptuneMLRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
                - rds.amazonaws.com
                - sagemaker.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Ref NeptuneMLPolicy

  SageMakerMLRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
                - rds.amazonaws.com
                - sagemaker.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Ref NeptuneMLPolicy

  NeptuneMLPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - ec2:CreateNetworkInterface
              - ec2:CreateNetworkInterfacePermission
              - ec2:CreateVpcEndpoint
              - ec2:DeleteNetworkInterface
              - ec2:DeleteNetworkInterfacePermission
              - ec2:DescribeDhcpOptions
              - ec2:DescribeNetworkInterfaces
              - ec2:DescribeRouteTables
              - ec2:DescribeSecurityGroups
              - ec2:DescribeSubnets
              - ec2:DescribeVpcEndpoints
              - ec2:DescribeVpcs
            Resource: '*'  # EC2 Describe operations don't support resource-level permissions
          - Effect: Allow
            Action:
              - ecr:GetAuthorizationToken
              - ecr:GetDownloadUrlForLayer
              - ecr:BatchGetImage
              - ecr:BatchCheckLayerAvailability
            Resource: '*'  # ECR GetAuthorizationToken is account-level operation
          - Effect: Allow
            Action: iam:PassRole
            Resource: !Sub 'arn:aws:iam::${AWS::AccountId}:role/*'
            Condition:
              StringEquals:
                iam:PassedToService: sagemaker.amazonaws.com
          - Effect: Allow
            Action:
              - logs:CreateLogGroup
              - logs:CreateLogStream
              - logs:PutLogEvents
              - logs:DescribeLogGroups
              - logs:DescribeLogStreams
              - logs:GetLogEvents
            Resource: !Sub 'arn:aws:logs:*:*:log-group:/aws/sagemaker/*'
          - Effect: Allow
            Action:
              - sagemaker:AddTags
              - sagemaker:CreateEndpoint
              - sagemaker:CreateEndpointConfig
              - sagemaker:CreateHyperParameterTuningJob
              - sagemaker:CreateModel
              - sagemaker:CreateProcessingJob
              - sagemaker:CreateTrainingJob
              - sagemaker:CreateTransformJob
              - sagemaker:DeleteEndpoint
              - sagemaker:DeleteEndpointConfig
              - sagemaker:DeleteModel
              - sagemaker:DescribeEndpoint
              - sagemaker:DescribeEndpointConfig
              - sagemaker:DescribeHyperParameterTuningJob
              - sagemaker:DescribeModel
              - sagemaker:DescribeProcessingJob
              - sagemaker:DescribeTrainingJob
              - sagemaker:DescribeTransformJob
              - sagemaker:InvokeEndpoint
              - sagemaker:ListTags
              - sagemaker:ListTrainingJobsForHyperParameterTuningJob
              - sagemaker:StopHyperParameterTuningJob
              - sagemaker:StopProcessingJob
              - sagemaker:StopTrainingJob
              - sagemaker:StopTransformJob
              - sagemaker:UpdateEndpoint
              - sagemaker:UpdateEndpointWeightsAndCapacities
            Resource: !Sub 'arn:aws:sagemaker:*:*:*'  # SageMaker resources created dynamically during ML training
          - Effect: Allow
            Action:
              - sagemaker:ListEndpointConfigs
              - sagemaker:ListEndpoints
              - sagemaker:ListHyperParameterTuningJobs
              - sagemaker:ListModels
              - sagemaker:ListProcessingJobs
              - sagemaker:ListTrainingJobs
              - sagemaker:ListTransformJobs
            Resource: '*'  # SageMaker List operations don't support resource-level permissions
          - Effect: Allow
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:DeleteObject
              - s3:AbortMultipartUpload
              - s3:ListBucket
            Resource: 'arn:aws:s3:::*'  # SageMaker creates temporary S3 buckets during training

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
      Policies:
        - PolicyName: NeptuneAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - neptune-db:ReadDataViaQuery
                  - neptune-db:WriteDataViaQuery
                  - neptune-db:DeleteDataViaQuery
                  - neptune-db:connect
                Resource: !Sub 'arn:aws:neptune-db:${AWS::Region}:${AWS::AccountId}:*/*'
        - PolicyName: SQSDLQAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                Resource: !Sub 'arn:aws:sqs:${AWS::Region}:${AWS::AccountId}:*-lambda-dlq'
        - PolicyName: SageMakerAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sagemaker:InvokeEndpoint
                Resource: !Sub 'arn:aws:sagemaker:${AWS::Region}:${AWS::AccountId}:endpoint/*'
        - PolicyName: CognitoAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cognito-idp:AdminInitiateAuth
                  - cognito-idp:AdminGetUser
                Resource: !Sub 'arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/*'

  TrainingLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
      Policies:
        - PolicyName: NeptuneMLTrainingPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - neptune-db:ReadDataViaQuery
                  - neptune-db:WriteDataViaQuery
                  - neptune-db:connect
                  - neptune-db:GetMLDataProcessingJobStatus
                  - neptune-db:GetMLModelTrainingJobStatus
                  - neptune-db:GetMLEndpointStatus
                  - neptune-db:StartMLDataProcessingJob
                  - neptune-db:StartMLModelTrainingJob
                  - neptune-db:CreateMLEndpoint
                Resource: !Sub 'arn:aws:neptune-db:${AWS::Region}:${AWS::AccountId}:*/*'
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                Resource: !Sub 'arn:aws:sqs:${AWS::Region}:${AWS::AccountId}:*-lambda-dlq'
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !Sub 'arn:aws:s3:::${S3BucketName}'
                  - !Sub 'arn:aws:s3:::${S3BucketName}/*'
              - Effect: Allow
                Action:
                  - rds:ModifyDBClusterParameterGroup
                  - rds:DescribeDBClusterParameters
                Resource: !Sub 'arn:aws:rds:${AWS::Region}:${AWS::AccountId}:cluster-pg:*'
              - Effect: Allow
                Action:
                  - rds:RebootDBInstance
                Resource: !Sub 'arn:aws:rds:${AWS::Region}:${AWS::AccountId}:db:*'
              - Effect: Allow
                Action:
                  - batch:SubmitJob
                Resource:
                  - !Sub 'arn:aws:batch:${AWS::Region}:${AWS::AccountId}:job-queue/*'
                  - !Sub 'arn:aws:batch:${AWS::Region}:${AWS::AccountId}:job-definition/*'
              - Effect: Allow
                Action:
                  - batch:DescribeJobs
                Resource: '*'
              - Effect: Allow
                Action:
                  - servicequotas:GetServiceQuota
                  - servicequotas:RequestServiceQuotaIncrease
                  - servicequotas:ListRequestedServiceQuotaChangeHistoryByQuota
                Resource: '*'

  BatchServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: batch.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSBatchServiceRole

  BatchInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEC2ContainerServiceforEC2Role

  BatchInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref BatchInstanceRole

  BatchJobRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
      Policies:
        - PolicyName: NeptuneExportPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - rds:DescribeDBClusters
                  - rds:DescribeDBInstances
                  - rds:DescribeDBClusterParameters
                  - rds:DescribeDBParameters
                Resource: '*'
              - Effect: Allow
                Action: rds:ListTagsForResource
                Resource:
                  - !Sub 'arn:aws:rds:${AWS::Region}:${AWS::AccountId}:cluster:*'
                  - !Sub 'arn:aws:rds:${AWS::Region}:${AWS::AccountId}:db:*'
              - Effect: Allow
                Action:
                  - neptune-db:connect
                  - neptune-db:ReadDataViaQuery
                Resource: !Sub 'arn:aws:neptune-db:${AWS::Region}:${AWS::AccountId}:*/*'
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:PutObjectTagging
                  - s3:ListBucket
                  - s3:GetBucketLocation
                Resource:
                  - !Sub 'arn:aws:s3:::${S3BucketName}'
                  - !Sub 'arn:aws:s3:::${S3BucketName}/*'
                  - !Sub 'arn:aws:s3:::cf-templates-*'
                  - !Sub 'arn:aws:s3:::cf-templates-*/*'

  StepFunctionsRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: states.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
      Policies:
        - PolicyName: InvokeLambda
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:auto-insurance-fraud-*'

  EventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
      Policies:
        - PolicyName: StartStepFunctions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: states:StartExecution
                Resource: !Sub 'arn:aws:states:${AWS::Region}:${AWS::AccountId}:stateMachine:AutoInsuranceMLTrainingPipeline'

Outputs:
  NeptuneMLRoleArn:
    Value: !GetAtt NeptuneMLRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-NeptuneMLRoleArn'
  
  SageMakerMLRoleArn:
    Value: !GetAtt SageMakerMLRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-SageMakerMLRoleArn'
  
  LambdaExecutionRoleArn:
    Value: !GetAtt LambdaExecutionRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-LambdaExecutionRoleArn'
  
  TrainingLambdaRoleArn:
    Value: !GetAtt TrainingLambdaRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-TrainingLambdaRoleArn'
  
  BatchServiceRoleArn:
    Value: !GetAtt BatchServiceRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-BatchServiceRoleArn'
  
  BatchInstanceProfileArn:
    Value: !GetAtt BatchInstanceProfile.Arn
    Export:
      Name: !Sub '${AWS::StackName}-BatchInstanceProfileArn'
  
  BatchJobRoleArn:
    Value: !GetAtt BatchJobRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-BatchJobRoleArn'
  
  StepFunctionsRoleArn:
    Value: !GetAtt StepFunctionsRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-StepFunctionsRoleArn'
  
  EventBridgeRoleArn:
    Value: !GetAtt EventBridgeRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-EventBridgeRoleArn'
