AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS Batch resources for Neptune export'

Parameters:
  PublicSubnet:
    Type: String
  
  BatchSecurityGroup:
    Type: String
  
  BatchServiceRoleArn:
    Type: String
  
  BatchInstanceProfileArn:
    Type: String
  
  BatchJobRoleArn:
    Type: String

Resources:
  BatchComputeEnvironment:
    Type: AWS::Batch::ComputeEnvironment
    Properties:
      ComputeEnvironmentName: !Sub '${AWS::StackName}-compute'
      Type: MANAGED
      State: ENABLED
      ServiceRole: !Ref BatchServiceRoleArn
      ComputeResources:
        Type: EC2
        AllocationStrategy: BEST_FIT_PROGRESSIVE
        MinvCpus: 0
        MaxvCpus: 32
        DesiredvCpus: 0
        InstanceTypes:
          - c6i
        Subnets:
          - !Ref PublicSubnet
        SecurityGroupIds:
          - !Ref BatchSecurityGroup
        InstanceRole: !Ref BatchInstanceProfileArn
        Ec2Configuration:
          - ImageType: ECS_AL2

  BatchJobQueue:
    Type: AWS::Batch::JobQueue
    Properties:
      JobQueueName: !Sub '${AWS::StackName}-export-queue'
      State: ENABLED
      Priority: 1
      ComputeEnvironmentOrder:
        - Order: 1
          ComputeEnvironment: !Ref BatchComputeEnvironment

  BatchJobDefinition:
    Type: AWS::Batch::JobDefinition
    Properties:
      JobDefinitionName: !Sub '${AWS::StackName}-export-job'
      Type: container
      ContainerProperties:
        Image: public.ecr.aws/amazonlinux/amazonlinux:2023
        JobRoleArn: !Ref BatchJobRoleArn
        ResourceRequirements:
          - Type: VCPU
            Value: '8'
          - Type: MEMORY
            Value: '16000'
        Volumes: []
        MountPoints: []
        Ulimits:
          - HardLimit: 10000
            Name: nofile
            SoftLimit: 10000

Outputs:
  BatchJobQueue:
    Value: !Ref BatchJobQueue
    Export:
      Name: !Sub '${AWS::StackName}-BatchJobQueue'
  
  BatchJobDefinition:
    Value: !Ref BatchJobDefinition
    Export:
      Name: !Sub '${AWS::StackName}-BatchJobDefinition'
