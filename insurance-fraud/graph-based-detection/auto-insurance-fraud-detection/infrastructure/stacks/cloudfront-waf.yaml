AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFront WAF WebACL (must be deployed in us-east-1)'

# This stack MUST be deployed in us-east-1 region
# CloudFront WAF WebACLs with Scope: CLOUDFRONT can only be created in us-east-1
# The WebACL ARN can then be referenced by CloudFront distributions in any region

Resources:
  CloudFrontWebACL:
    Type: AWS::WAFv2::WebACL
    DeletionPolicy: Retain
    Properties:
      Name: !Sub '${AWS::StackName}-CloudFront-WebACL'
      Scope: CLOUDFRONT
      DefaultAction:
        Allow: {}
      Rules:
        - Name: RateLimitRule
          Priority: 1
          Statement:
            RateBasedStatement:
              Limit: 2000
              AggregateKeyType: IP
          Action:
            Block: {}
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: CloudFrontRateLimitRule
        - Name: AWSManagedRulesCommonRuleSet
          Priority: 2
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesCommonRuleSet
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: AWSManagedRulesCommonRuleSet
        - Name: AWSManagedRulesKnownBadInputsRuleSet
          Priority: 3
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesKnownBadInputsRuleSet
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: AWSManagedRulesKnownBadInputsRuleSet
      VisibilityConfig:
        SampledRequestsEnabled: true
        CloudWatchMetricsEnabled: true
        MetricName: CloudFrontWebACL

Outputs:
  WebACLArn:
    Description: 'CloudFront WAF WebACL ARN (use this in CloudFront distributions)'
    Value: !GetAtt CloudFrontWebACL.Arn
    Export:
      Name: !Sub '${AWS::StackName}-WebACL-Arn'
