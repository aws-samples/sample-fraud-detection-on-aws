AWSTemplateFormatVersion: '2010-09-09'
Description: 'Helper resources for Auto Insurance Fraud Detection'

Resources:
  S3PrefixListLookupRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: PrefixListLookup
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: ec2:DescribePrefixLists
                Resource: '*'
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/*'

  S3PrefixListLookupFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.14
      Handler: index.handler
      Role: !GetAtt S3PrefixListLookupRole.Arn
      Timeout: 30
      ReservedConcurrentExecutions: 1
      Code:
        ZipFile: |
          import boto3
          import cfnresponse
          def handler(event, context):
              if event['RequestType'] == 'Delete':
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                  return
              try:
                  ec2 = boto3.client('ec2')
                  region = event['ResourceProperties']['Region']
                  resp = ec2.describe_prefix_lists(Filters=[{'Name': 'prefix-list-name', 'Values': [f'com.amazonaws.{region}.s3']}])
                  prefix_list_id = resp['PrefixLists'][0]['PrefixListId']
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {'PrefixListId': prefix_list_id})
              except Exception as e:
                  cfnresponse.send(event, context, cfnresponse.FAILED, {'Error': str(e)})

  S3PrefixListLookup:
    Type: Custom::S3PrefixListLookup
    Properties:
      ServiceToken: !GetAtt S3PrefixListLookupFunction.Arn
      Region: !Ref 'AWS::Region'

Outputs:
  S3PrefixListId:
    Value: !GetAtt S3PrefixListLookup.PrefixListId
    Export:
      Name: !Sub '${AWS::StackName}-S3PrefixListId'
