Description: 'REST API Gateway for Auto Insurance Fraud Detection - All Routes'

Parameters:
  FraudDetectionFunctionArn:
    Type: String

  AuthenticateUserFunctionArn:
    Type: String

  JwtCookieAuthorizerFunctionArn:
    Type: String
    Description: ARN of the Lambda authorizer that validates the __Host-fraud_detection_token cookie

  TemplateBucket:
    Type: String

  WebACLArn:
    Type: String
    Description: WAF Web ACL ARN

  UserPoolId:
    Type: String
    Description: Cognito User Pool ID

  UserPoolClientId:
    Type: String
    Description: Cognito User Pool Client ID

  UserPoolIssuer:
    Type: String
    Description: Cognito User Pool Issuer URL

  AllowedOrigin:
    Type: String
    Description: CloudFront URL for CORS Access-Control-Allow-Origin header

  KmsKeyArn:
    Type: String
    Default: ''
    Description: KMS Key ARN for CloudWatch Log Group encryption

Resources:
  APIGatewayCloudWatchLogsRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonAPIGatewayPushToCloudWatchLogs

  APIGatewayAccount:
    Type: AWS::ApiGateway::Account
    Properties:
      CloudWatchRoleArn: !GetAtt APIGatewayCloudWatchLogsRole.Arn

  APILogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/apigateway/${AWS::StackName}'
      RetentionInDays: 30
      KmsKeyId: !Ref KmsKeyArn

  AutoInsuranceAPI:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub '${AWS::StackName}-API'
      Description: Auto Insurance Fraud Detection API
      EndpointConfiguration:
        Types:
          - REGIONAL

  # Lambda REQUEST authorizer that validates the httpOnly __Host-fraud_detection_token
  # cookie. Replaces the former Cognito-native authorizer so the frontend can
  # remove the JS-accessible Authorization header path (XSS hardening).
  CognitoAuthorizer:
    Type: AWS::ApiGateway::Authorizer
    Properties:
      Name: JwtCookieAuthorizer
      Type: REQUEST
      # Using the Cookie header as the cache key means the authorizer result
      # (allow + context) is cached per-user for the configured TTL.
      IdentitySource: method.request.header.Cookie
      RestApiId: !Ref AutoInsuranceAPI
      AuthorizerUri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${JwtCookieAuthorizerFunctionArn}/invocations'
      AuthorizerResultTtlInSeconds: 300

  # Grant API Gateway permission to invoke the authorizer Lambda
  JwtCookieAuthorizerPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref JwtCookieAuthorizerFunctionArn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${AutoInsuranceAPI}/authorizers/*'

  RequestValidator:
    Type: AWS::ApiGateway::RequestValidator
    Properties:
      Name: BodyAndParametersValidator
      RestApiId: !Ref AutoInsuranceAPI
      ValidateRequestBody: true
      ValidateRequestParameters: true

