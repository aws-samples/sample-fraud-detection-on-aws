AWSTemplateFormatVersion: '2010-09-09'
Description: 'REST API Gateway for Auto Insurance Fraud Detection - All Routes'

Parameters:
  FraudDetectionFunctionArn:
    Type: String
  
  AuthenticateUserFunctionArn:
    Type: String
  
  TemplateBucket:
    Type: String
  
  WebACLArn:
    Type: String
    Description: WAF Web ACL ARN
  
  UserPoolId:
    Type: String
    Description: Cognito User Pool ID
  
  UserPoolClientId:
    Type: String
    Description: Cognito User Pool Client ID
  
  UserPoolIssuer:
    Type: String
    Description: Cognito User Pool Issuer URL

  AllowedOrigin:
    Type: String
    Description: CloudFront URL for CORS Access-Control-Allow-Origin header

  KmsKeyArn:
    Type: String
    Default: ''
    Description: KMS Key ARN for CloudWatch Log Group encryption

Resources:
  # IAM Role for API Gateway to write to CloudWatch Logs
  APIGatewayCloudWatchLogsRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonAPIGatewayPushToCloudWatchLogs

  # API Gateway Account (sets CloudWatch Logs role at account level)
  APIGatewayAccount:
    Type: AWS::ApiGateway::Account
    Properties:
      CloudWatchRoleArn: !GetAtt APIGatewayCloudWatchLogsRole.Arn

  APILogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/apigateway/${AWS::StackName}'
      RetentionInDays: 30
      KmsKeyId: !Ref KmsKeyArn

  AutoInsuranceAPI:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub '${AWS::StackName}-API'
      Description: Auto Insurance Fraud Detection API
      EndpointConfiguration:
        Types:
          - REGIONAL

  # Cognito Authorizer
  CognitoAuthorizer:
    Type: AWS::ApiGateway::Authorizer
    Properties:
      Name: CognitoAuthorizer
      Type: COGNITO_USER_POOLS
      IdentitySource: method.request.header.Authorization
      RestApiId: !Ref AutoInsuranceAPI
      ProviderARNs:
        - !Sub 'arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${UserPoolId}'

  # Request Validator for body and parameters
  RequestValidator:
    Type: AWS::ApiGateway::RequestValidator
    Properties:
      Name: BodyAndParametersValidator
      RestApiId: !Ref AutoInsuranceAPI
      ValidateRequestBody: true
      ValidateRequestParameters: true

  # Resources and Methods
  # /auth
  AuthResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref AutoInsuranceAPI
      ParentId: !GetAtt AutoInsuranceAPI.RootResourceId
      PathPart: auth

  # /auth/login (NO authentication required)
  AuthLoginResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref AutoInsuranceAPI
      ParentId: !Ref AuthResource
      PathPart: login

  AuthLoginMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref AutoInsuranceAPI
      ResourceId: !Ref AuthLoginResource
      HttpMethod: POST
      AuthorizationType: NONE
      RequestValidatorId: !Ref RequestValidator
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${AuthenticateUserFunctionArn}/invocations'

  AuthLoginOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref AutoInsuranceAPI
      ResourceId: !Ref AuthLoginResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: '{"statusCode": 200}'
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,Authorization,X-Request-Timestamp,X-Request-Signature'"
              method.response.header.Access-Control-Allow-Methods: "'POST,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: !Sub "'${AllowedOrigin}'"  
              method.response.header.Access-Control-Allow-Credentials: "'true'"
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true
            method.response.header.Access-Control-Allow-Credentials: true

  # /auth/users (NO authentication required)
  AuthUsersResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref AutoInsuranceAPI
      ParentId: !Ref AuthResource
      PathPart: users

  AuthUsersMethod:
    Type: AWS::ApiGateway::Method
    Properties:
