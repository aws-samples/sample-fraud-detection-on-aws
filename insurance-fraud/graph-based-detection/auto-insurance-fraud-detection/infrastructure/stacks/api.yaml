  # ------------------------------------------------------------------
  # Deployment + Stage + Lambda permission + WAF association
  # ------------------------------------------------------------------
  APIDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - AuthLoginPostMethod
      - AuthLogoutPostMethod
      - AuthRefreshPostMethod
      - ClaimsGetMethod
      - ClaimsPostMethod
      - ClaimIdGetMethod
      - ClaimGraphGetMethod
      - ClaimantsListGetMethod
      - ClaimantIdGetMethod
      - ClaimantClaimsGetMethod
      - ClaimantRiskScoreGetMethod
      - ClaimantVelocityGetMethod
      - ClaimantFraudAnalysisGetMethod
      - CRStagedAccidentsGetMethod
      - CRSwoopAndSquatGetMethod
      - CRStuffedPassengersGetMethod
      - CRPaperCollisionsGetMethod
      - CRCorruptAttorneysGetMethod
      - CRCorruptTowCompaniesGetMethod
      - NFProfessionalWitnessesGetMethod
      - NFOrganizedRingsGetMethod
      - NFFraudHubsGetMethod
      - NFCollusionIndicatorsGetMethod
      - NFIsolatedRingsGetMethod
      - NFCrossClaimPatternsGetMethod
      - NFMedicalProviderGetMethod
      - NFMedicalProviderAnalysisGetMethod
      - AAInfluentialClaimantsGetMethod
      - AAConnectionsGetMethod
      - ELRepairShopGetMethod
      - ELRepairShopStatsGetMethod
      - ELVehicleGetMethod
      - ELVehicleFraudHistoryGetMethod
      - FraudTrendsGetMethod
      - GeographicHotspotsGetMethod
      - ClaimAmountAnomaliesGetMethod
      - TemporalPatternsGetMethod
      - AttorneysListGetMethod
      - WitnessesListGetMethod
      - PassengersListGetMethod
      - TowCompaniesListGetMethod
      - MedicalProvidersListGetMethod
      - RepairShopsListGetMethod
      - VehiclesListGetMethod
    Properties:
      RestApiId: !Ref AutoInsuranceAPI
      Description: !Sub 'Deployment for ${AWS::StackName}'

  APIStage:
    Type: AWS::ApiGateway::Stage
    DependsOn: APIGatewayAccount
    Properties:
      RestApiId: !Ref AutoInsuranceAPI
      DeploymentId: !Ref APIDeployment
      StageName: prod
      TracingEnabled: true
      AccessLogSetting:
        DestinationArn: !GetAtt APILogGroup.Arn
        Format: '{"requestId":"$context.requestId","ip":"$context.identity.sourceIp","caller":"$context.identity.caller","user":"$context.identity.user","requestTime":"$context.requestTime","httpMethod":"$context.httpMethod","resourcePath":"$context.resourcePath","status":"$context.status","protocol":"$context.protocol","responseLength":"$context.responseLength"}'
      CacheClusterEnabled: false
      MethodSettings:
        - ResourcePath: '/*'
          HttpMethod: '*'
          CachingEnabled: false
          ThrottlingBurstLimit: 100
          ThrottlingRateLimit: 50
          LoggingLevel: INFO

  LambdaAPIPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref FraudDetectionFunctionArn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${AutoInsuranceAPI}/*/*'

  AuthLambdaAPIPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref AuthenticateUserFunctionArn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${AutoInsuranceAPI}/*/*'

  WebACLAssociation:
    Type: AWS::WAFv2::WebACLAssociation
    DependsOn: APIStage
    Properties:
      ResourceArn: !Sub 'arn:aws:apigateway:${AWS::Region}::/restapis/${AutoInsuranceAPI}/stages/prod'
      WebACLArn: !Ref WebACLArn

Outputs:
  APIEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub 'https://${AutoInsuranceAPI}.execute-api.${AWS::Region}.amazonaws.com/prod'
    Export:
      Name: !Sub '${AWS::StackName}-APIEndpoint'

  APIId:
    Description: API Gateway ID
    Value: !Ref AutoInsuranceAPI
    Export:
      Name: !Sub '${AWS::StackName}-APIId'
